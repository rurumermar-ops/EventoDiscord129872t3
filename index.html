<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción Discord</title>
    <style>
        /* --- ESTILOS GENERALES --- */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #04060e; color: #ffffff; overflow: hidden;
        }

        #canvas-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }

        .app-container {
            position: relative; width: 100%; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .view {
            position: absolute; display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 500px;
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.5s ease;
            opacity: 0; pointer-events: none;
        }

        .view.active { opacity: 1; transform: translateX(0); pointer-events: auto; }
        .view.hidden-left { transform: translateX(-150%); }
        .view.hidden-right { transform: translateX(150%); }

        /* --- BOTONES --- */
        .btn-green {
            background-color: #10b981; color: white; border: none; border-radius: 50px;
            padding: 16px 45px; font-size: 1.3rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 30px 10px rgba(52, 211, 153, 0.6); transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        .btn-green:hover {
            background-color: #059669; box-shadow: 0 0 45px 15px rgba(52, 211, 153, 0.9); transform: scale(1.05);
        }
        .btn-green:disabled { background-color: #6ee7b7; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-cancel {
            background-color: transparent; color: #ef4444; border: 2px solid #ef4444;
            border-radius: 50px; padding: 13px 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.3s ease;
        }
        .btn-cancel:hover { background-color: #ef4444; color: white; box-shadow: 0 0 20px 5px rgba(239, 68, 68, 0.4); }

        .button-group { display: flex; gap: 15px; margin-top: 20px; }

        /* --- FORMULARIO --- */
        h2 { font-size: 2rem; text-align: center; margin-bottom: 30px; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        input[type="text"], textarea {
            padding: 15px 25px; border-radius: 30px; border: 2px solid rgba(16, 185, 129, 0.5);
            background: rgba(4, 6, 14, 0.6); color: white; font-size: 1.2rem;
            width: 80%; text-align: center; outline: none; transition: all 0.3s ease; backdrop-filter: blur(5px);
        }
        input[type="text"]:focus, textarea:focus { border-color: #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); background: rgba(255, 255, 255, 0.1); }

        /* --- CUADRO DE USUARIOS Y BLOC DE NOTAS --- */
        .users-container { margin-top: 30px; width: 340px; display: flex; flex-direction: column; align-items: center; }
        
        .users-title-wrapper {
            display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px;
        }

        .users-title { 
            font-size: 1.1rem; color: #a7f3d0; text-transform: uppercase; letter-spacing: 2px; user-select: none;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }

        .admin-dot {
            color: #10b981; font-size: 0.8rem; cursor: pointer; user-select: none; transition: opacity 0.2s;
        }
        .admin-dot:hover { opacity: 0.7; }
        
        .users-box, .info-notepad {
            background: rgba(5, 8, 20, 0.75); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 15px;
            width: 100%; height: 140px; overflow-y: auto; padding: 15px; box-sizing: border-box; backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        /* Estilo específico del Bloc de Notas público */
        .info-notepad {
            margin-top: 20px;
            height: 110px;
            border-color: rgba(0, 212, 255, 0.3);
            white-space: pre-wrap; /* Mantiene los saltos de línea */
            font-size: 0.95rem;
            color: #e2e8f0;
            text-align: left;
        }

        .user-list { list-style: none; padding: 0; margin: 0; }
        .user-list li {
            padding: 10px 14px; background: rgba(255, 255, 255, 0.03); margin-bottom: 8px;
            border-radius: 8px; display: flex; align-items: center; font-size: 1.05rem;
            border-left: 3px solid #10b981;
        }
        .user-list li::before { content: "👾"; margin-right: 10px; font-size: 1.1rem; }

        .users-count {
            margin-top: 10px; font-size: 0.95rem; color: #6ee7b7; font-weight: 500;
            letter-spacing: 1px; text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* --- ELEMENTOS DEL PANEL ADMIN --- */
        .btn-mini-delete {
            background: #ef4444; border: none; color: white; font-size: 0.8rem; font-weight: bold;
            padding: 5px 10px; border-radius: 20px; cursor: pointer; margin-left: auto;
        }
        .admin-textarea {
            width: 100%; height: 100px; border-radius: 10px; margin-top: 15px;
            font-family: inherit; font-size: 1rem; text-align: left; resize: none; box-sizing: border-box;
        }

        /* Scrollbars */
        .users-box::-webkit-scrollbar, .info-notepad::-webkit-scrollbar { width: 6px; }
        .users-box::-webkit-scrollbar-track, .info-notepad::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        .users-box::-webkit-scrollbar-thumb, .info-notepad::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div class="app-container">
        
        <div id="view-home" class="view active">
            <button class="btn-green" id="btn-go-form">Inscribirse</button>
            
            <div class="users-container">
                <div class="users-title-wrapper">
                    <div class="users-title">Usuarios Inscritos</div>
                    <span class="admin-dot" id="admin-dot-trigger">●</span>
                </div>
                <div class="users-box">
                    <ul class="user-list" id="users-list">
                        <li style="justify-content:center; opacity:0.5; cursor:default;">Cargando inscripciones...</li>
                    </ul>
                </div>
                <div class="users-count" id="users-counter">Total inscritos: 0</div>

                <div class="users-title" style="margin-top: 20px; color: #00d4ff; font-size: 0.9rem;">INFO DEL EVENTO</div>
                <div class="info-notepad" id="info-notepad-text">Cargando información...</div>
            </div>
        </div>

        <div id="view-form" class="view hidden-right">
            <h2>¿Cuál es tu User de Discord?</h2>
            <input type="text" id="discord-user" placeholder="Usuario#0000" autocomplete="off">
            
            <div class="button-group">
                <button class="btn-cancel" id="btn-cancel">Cancelar</button>
                <button class="btn-green" id="btn-submit">Inscribirse</button>
            </div>
        </div>

        <div id="view-admin" class="view hidden-right">
            <h2 style="color: #a7f3d0; font-size: 1.6rem; margin-bottom: 10px;">Panel Control Admin</h2>
            
            <div class="users-container" style="margin-top: 10px;">
                <div class="users-title" style="font-size: 0.9rem; color: #ef4444;">Eliminar Inscritos</div>
                <div class="users-box" style="border-color: #ef4444; height: 120px;">
                    <ul class="user-list" id="admin-users-list"></ul>
                </div>

                <div class="users-title" style="margin-top: 15px; font-size: 0.9rem; color: #00d4ff;">Editar Bloc de Notas (INFO)</div>
                <textarea class="admin-textarea" id="admin-info-input" placeholder="Escribe aquí las reglas o info del evento..."></textarea>
                <button class="btn-green" id="btn-save-info" style="padding: 8px 25px; font-size: 1rem; margin-top: 10px; box-shadow: none;">Actualizar INFO</button>
            </div>
            
            <button class="btn-cancel" id="btn-close-admin" style="margin-top: 20px; padding: 10px 40px;">Salir del Panel</button>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let w, h, time = 0;

        function resizeCanvas() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        const mathNodes = [];
        for(let i = 0; i < 30; i++) {
            mathNodes.push({
                x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
                radius: Math.random() * 2 + 1, vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4
            });
        }

        function drawMathBackground() {
            let gradient = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, Math.max(w, h));
            gradient.addColorStop(0, '#070c1e'); gradient.addColorStop(1, '#020307');
            ctx.fillStyle = gradient; ctx.fillRect(0, 0, w, h);

            ctx.strokeStyle = 'rgba(16, 185, 129, 0.03)'; ctx.lineWidth = 1;
            const centerHeight = h * 0.5;
            for (let i = -w; i < w * 2; i += 50) {
                ctx.beginPath(); ctx.moveTo(w / 2, centerHeight); ctx.lineTo(i, h); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(w / 2, centerHeight); ctx.lineTo(i, 0); ctx.stroke();
            }

            ctx.fillStyle = 'rgba(0, 212, 255, 0.2)'; ctx.strokeStyle = 'rgba(0, 212, 255, 0.03)';
            mathNodes.forEach((node, index) => {
                ctx.beginPath(); ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2); ctx.fill();
                node.x += node.vx; node.y += node.vy;
                if (node.x < 0 || node.x > w) node.vx *= -1; if (node.y < 0 || node.y > h) node.vy *= -1;
                for (let j = index + 1; j < mathNodes.length; j++) {
                    const other = mathNodes[j]; const dist = Math.hypot(node.x - other.x, node.y - other.y);
                    if (dist < 120) { ctx.beginPath(); ctx.moveTo(node.x, node.y); ctx.lineTo(other.x, other.y); ctx.stroke(); }
                }
            });

            const totalWaves = 6;
            for (let wIndex = 0; wIndex < totalWaves; wIndex++) {
                ctx.beginPath();
                if (wIndex % 2 === 0) ctx.strokeStyle = `rgba(16, 185, 129, ${0.08 + (wIndex * 0.04)})`;
                else ctx.strokeStyle = `rgba(0, 212, 255, ${0.08 + (wIndex * 0.04)})`;
                ctx.lineWidth = 1 + wIndex * 0.5;

                for (let x = 0; x < w; x += 8) {
                    const sin1 = Math.sin(x * 0.008 + time * 1.5 + wIndex); const sin2 = Math.sin(x * 0.02 + time * 0.7 - wIndex);
                    const cos1 = Math.cos(x * 0.004 - time * 1.1 + wIndex * 1.5);
                    const centerDist = Math.abs(x - w / 2); const envelope = Math.exp(-Math.pow(centerDist / (w * 0.35), 2));
                    const amplitude = (sin1 * 50 + sin2 * 25 + cos1 * 15) * envelope; const y = centerHeight + amplitude;
                    if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
            time += 0.015; requestAnimationFrame(drawMathBackground);
        }
        drawMathBackground();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKNm31kYh-lLAs-pOWIVLQ0x5PKILyBTM",
            authDomain: "inscripcionesevento2137612d.firebaseapp.com",
            projectId: "inscripcionesevento2137612d",
            storageBucket: "inscripcionesevento2137612d.firebasestorage.app",
            messagingSenderId: "659015075726",
            appId: "1:659015075726:web:ac9e83f12e72a43b4dc6df",
            measurementId: "G-CN3MER5DMZ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const viewHome = document.getElementById('view-home');
        const viewForm = document.getElementById('view-form');
        const viewAdmin = document.getElementById('view-admin');
        const discordInput = document.getElementById('discord-user');
        const usersListElement = document.getElementById('users-list');
        const adminUsersListElement = document.getElementById('admin-users-list');
        const usersCounterElement = document.getElementById('users-counter');
        const infoNotepadText = document.getElementById('info-notepad-text');
        const adminInfoInput = document.getElementById('admin-info-input');
        const btnGoForm = document.getElementById('btn-go-form');
        const btnCancel = document.getElementById('btn-cancel');
        const btnSubmit = document.getElementById('btn-submit');
        const btnCloseAdmin = document.getElementById('btn-close-admin');
        const btnSaveInfo = document.getElementById('btn-save-info');
        const adminDotTrigger = document.getElementById('admin-dot-trigger');

        // NAVEGACIÓN: ENTRAR AL PANEL ADMIN
        adminDotTrigger.addEventListener('click', () => {
            const clave = prompt("Introduce clave de acceso:");
            if (clave === "0877") {
                viewHome.classList.remove('active'); viewHome.classList.add('hidden-left');
                viewAdmin.classList.remove('hidden-right'); viewAdmin.classList.add('active');
            } else if (clave !== null) {
                alert("Acceso denegado.");
            }
        });

        // NAVEGACIÓN: SALIR DEL PANEL ADMIN
        btnCloseAdmin.addEventListener('click', () => {
            viewAdmin.classList.remove('active'); viewAdmin.classList.add('hidden-right');
            viewHome.classList.remove('hidden-left'); viewHome.classList.add('active');
        });

        // NAVEGACIÓN: FORMULARIO
        btnGoForm.addEventListener('click', () => {
            viewHome.classList.remove('active'); viewHome.classList.add('hidden-left');
            viewForm.classList.remove('hidden-right'); viewForm.classList.add('active');
            setTimeout(() => discordInput.focus(), 600);
        });

        btnCancel.addEventListener('click', () => {
            viewForm.classList.remove('active'); viewForm.classList.add('hidden-right');
            viewHome.classList.remove('hidden-left'); viewHome.classList.add('active');
            discordInput.value = '';
        });

        // ACCIÓN: GUARDAR NUEVA INSCRIPCIÓN
        async function registerUser() {
            const user = discordInput.value.trim();
            if (user === '') {
                discordInput.style.transform = 'translateX(-10px)';
                setTimeout(() => discordInput.style.transform = 'translateX(10px)', 100);
                setTimeout(() => discordInput.style.transform = 'translateX(0)', 200);
                return;
            }

            btnSubmit.disabled = true; btnSubmit.textContent = "Guardando...";

            try {
                await addDoc(collection(db, "inscripciones"), { username: user, timestamp: serverTimestamp() });
                btnCancel.click(); 
            } catch (error) {
                alert("Error al guardar.");
            } finally {
                btnSubmit.disabled = false; btnSubmit.textContent = "Inscribirse";
            }
        }
        btnSubmit.addEventListener('click', registerUser);
        discordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') registerUser(); });

        // ACCIÓN: GUARDAR/MODIFICAR EL BLOC DE NOTAS DE INFO (SÓLO ADMIN)
        btnSaveInfo.addEventListener('click', async () => {
            const nuevoTexto = adminInfoInput.value;
            btnSaveInfo.disabled = true;
            btnSaveInfo.textContent = "Guardando...";
            try {
                // Guarda el texto en un documento fijo llamado "texto_info" dentro de la colección "configuracion"
                await setDoc(doc(db, "configuracion", "texto_info"), { contenido: nuevoTexto });
                alert("¡INFO del Bloc de Notas actualizada con éxito! 🎉");
            } catch (e) {
                alert("Error al intentar actualizar la información.");
            } finally {
                btnSaveInfo.disabled = false;
                btnSaveInfo.textContent = "Actualizar INFO";
            }
        });

        // SINCRONIZACIÓN 1: Lista de usuarios y contador en tiempo real
        const qUsers = query(collection(db, "inscripciones"), orderBy("timestamp", "desc"));
        onSnapshot(qUsers, (snapshot) => {
            usersListElement.innerHTML = '';
            adminUsersListElement.innerHTML = '';
            usersCounterElement.textContent = `Total inscritos: ${snapshot.size}`;
            
            if (snapshot.empty) {
                const emptyItem = '<li style="justify-content:center; opacity:0.5; cursor:default;">Aún no hay inscritos</li>';
                usersListElement.innerHTML = emptyItem;
                adminUsersListElement.innerHTML = emptyItem;
                return;
            }
            snapshot.forEach((documentoFirebase) => {
                const data = documentoFirebase.data();
                
                // Lista Pública
                const liNormal = document.createElement('li');
                liNormal.textContent = data.username;
                usersListElement.appendChild(liNormal);

                // Lista Admin con botón Eliminar
                const liAdmin = document.createElement('li');
                liAdmin.textContent = data.username;
                const btnEliminar = document.createElement('button');
                btnEliminar.className = 'btn-mini-delete'; btnEliminar.textContent = 'Eliminar';
                btnEliminar.onclick = async () => {
                    if (confirm(`¿Remover a ${data.username}?`)) {
                        await deleteDoc(doc(db, "inscripciones", documentoFirebase.id));
                    }
                };
                liAdmin.appendChild(btnEliminar);
                adminUsersListElement.appendChild(liAdmin);
            });
        });

        // SINCRONIZACIÓN 2: Bloc de notas de INFO en tiempo real
        onSnapshot(doc(db, "configuracion", "texto_info"), (documento) => {
            if (documento.exists()) {
                const textoGlobal = documento.data().contenido;
                infoNotepadText.textContent = textoGlobal; // Lo muestra al público
                adminInfoInput.value = textoGlobal;       // Lo carga en la caja del admin para editarlo fácilmente
            } else {
                infoNotepadText.innerHTML = '<span style="opacity:0.5;">No hay información disponible.</span>';
                adminInfoInput.value = '';
            }
        });
    </script>
</body>
</html>
