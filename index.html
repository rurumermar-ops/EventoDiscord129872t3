<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción Discord</title>
    <style>
        /* --- ESTILOS GENERALES Y IMAGEN DE FONDO --- */
        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            overflow-x: hidden;

            /* Imagen de fondo fija con una capa oscura encima */
            background-image: linear-gradient(rgba(4, 6, 14, 0.75), rgba(4, 6, 14, 0.75)), url('tete.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* CANVAS PARA EFECTOS DE ENFOQUES DE SOL Y LUCES */
        #canvas-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            pointer-events: none;
        }

        .app-container {
            position: relative; width: 100%; min-height: 100vh;
            display: flex; justify-content: center; align-items: flex-start;
            z-index: 2;
        }

        /* VISTAS CON ANIMACIÓN DE LADO A LADO */
        .view {
            position: absolute; display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 500px; padding: 60px 20px 80px 20px; box-sizing: border-box;
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.5s ease;
            opacity: 0; pointer-events: none;
        }

        .view.active { opacity: 1; transform: translateX(0); pointer-events: auto; position: relative; }
        .view.hidden-left { transform: translateX(-150%); position: absolute; }
        .view.hidden-right { transform: translateX(150%); position: absolute; }

        /* --- ANIMACIONES DE ENTRADA SUAVE --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-up {
            animation: fadeInUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* --- BOTONES PERFECTAMENTE SIMÉTRICOS --- */
        .btn-green, .btn-cancel {
            font-size: 1.2rem; font-weight: bold; cursor: pointer; letter-spacing: 1px;
            padding: 15px 40px; border-radius: 50px; border: none;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 160px; box-sizing: border-box;
        }

        .btn-green {
            background-color: #10b981; color: white;
            box-shadow: 0 0 25px 5px rgba(16, 185, 129, 0.4);
            margin-bottom: 25px;
        }
        .btn-green:hover {
            background-color: #059669; box-shadow: 0 0 35px 12px rgba(16, 185, 129, 0.7); transform: scale(1.05);
        }
        .btn-green:disabled { background-color: #6ee7b7; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-cancel {
            background-color: transparent; color: #ef4444; 
            border: 2px solid #ef4444;
            box-shadow: 0 0 15px 2px rgba(239, 68, 68, 0.1);
        }
        .btn-cancel:hover { 
            background-color: #ef4444; color: white; 
            box-shadow: 0 0 25px 8px rgba(239, 68, 68, 0.5); 
            transform: scale(1.05);
        }

        .button-group { display: flex; gap: 20px; margin-top: 25px; }

        /* --- FORMULARIO --- */
        h2 { font-size: 2rem; text-align: center; margin-bottom: 30px; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        input[type="text"], textarea {
            padding: 15px 25px; border-radius: 30px; border: 2px solid rgba(16, 185, 129, 0.3);
            background: rgba(4, 6, 14, 0.9); color: white; font-size: 1.2rem;
            width: 85%; text-align: center; outline: none; transition: all 0.3s ease; backdrop-filter: blur(10px);
        }
        input[type="text"]:focus, textarea:focus { border-color: #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); background: rgba(255, 255, 255, 0.05); }

        /* --- CUADRO DE USUARIOS Y BLOC DE NOTAS --- */
        .users-container { margin-top: 10px; width: 350px; display: flex; flex-direction: column; align-items: center; }
        
        .users-title-wrapper {
            display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 15px;
        }

        .users-title { 
            font-size: 1.1rem; color: #a7f3d0; text-transform: uppercase; letter-spacing: 2px; user-select: none;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }

        .admin-dot {
            color: #10b981; font-size: 0.8rem; cursor: pointer; user-select: none; transition: all 0.3s ease;
        }
        .admin-dot:hover { transform: scale(1.3); text-shadow: 0 0 8px #10b981; }
        
        .users-box {
            background: rgba(5, 8, 20, 0.85); border: 1px solid rgba(16, 185, 129, 0.25); border-radius: 15px;
            width: 100%; height: 190px; overflow-y: auto; padding: 15px; box-sizing: border-box; backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); transition: border-color 0.3s;
        }
        .users-box:hover { border-color: rgba(16, 185, 129, 0.5); }

        .info-section {
            margin-top: 180px; width: 100%; display: flex; flex-direction: column; align-items: center;
        }

        .info-notepad {
            margin-top: 15px; width: 100%; height: 180px; overflow-y: auto; padding: 15px; box-sizing: border-box;
            background: rgba(5, 8, 20, 0.85); border: 1px solid rgba(0, 212, 255, 0.25); border-radius: 15px;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            white-space: pre-wrap; font-size: 1rem; color: #e2e8f0; text-align: left; transition: border-color 0.3s;
        }
        .info-notepad:hover { border-color: rgba(0, 212, 255, 0.5); }

        .user-list { list-style: none; padding: 0; margin: 0; }
        .user-list li {
            padding: 11px 14px; background: rgba(255, 255, 255, 0.03); margin-bottom: 8px;
            border-radius: 8px; display: flex; align-items: center; font-size: 1.05rem;
            border-left: 3px solid #10b981;
            animation: fadeInUp 0.4s ease forwards;
        }
        .user-list li::before { content: "👾"; margin-right: 10px; font-size: 1.1rem; }

        .users-count {
            margin-top: 12px; font-size: 0.95rem; color: #6ee7b7; font-weight: 500;
            letter-spacing: 1px; text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* --- PANEL ADMIN CONTROLS --- */
        .btn-mini-delete {
            background: #ef4444; border: none; color: white; font-size: 0.8rem; font-weight: bold;
            padding: 6px 12px; border-radius: 20px; cursor: pointer; margin-left: auto; transition: background 0.2s, transform 0.2s;
        }
        .btn-mini-delete:hover { background: #dc2626; transform: scale(1.05); }

        .admin-textarea {
            width: 100%; height: 120px; border-radius: 15px; margin-top: 15px;
            font-family: inherit; font-size: 1rem; text-align: left; resize: none; box-sizing: border-box;
        }

        /* Scrollbars */
        .users-box::-webkit-scrollbar, .info-notepad::-webkit-scrollbar { width: 6px; }
        .users-box::-webkit-scrollbar-track, .info-notepad::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 10px; }
        .users-box::-webkit-scrollbar-thumb, .info-notepad::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div class="app-container">
        
        <div id="view-home" class="view active">
            <button class="btn-green animate-fade-up" id="btn-go-form">Inscribirse</button>
            
            <div class="users-container animate-fade-up" style="animation-delay: 0.15s;">
                <div class="users-title-wrapper">
                    <div class="users-title">Usuarios Inscritos</div>
                    <span class="admin-dot" id="admin-dot-trigger">●</span>
                </div>
                <div class="users-box">
                    <ul class="user-list" id="users-list">
                        <li style="justify-content:center; opacity:0.5; cursor:default;">Cargando inscripciones...</li>
                    </ul>
                </div>
                <div class="users-count" id="users-counter">Total inscritos: 0</div>

                <div class="info-section">
                    <div class="users-title" style="color: #00d4ff; font-size: 0.9rem;">INFO DEL EVENTO</div>
                    <div class="info-notepad" id="info-notepad-text">Cargando información...</div>
                </div>
            </div>
        </div>

        <div id="view-form" class="view hidden-right">
            <h2>¿Cuál es tu User de Discord?</h2>
            <input type="text" id="discord-user" placeholder="Usuario#0000" autocomplete="off">
            
            <div class="button-group">
                <button class="btn-cancel" id="btn-cancel">Cancelar</button>
                <button class="btn-green" id="btn-submit" style="margin-bottom: 0;">Inscribirse</button>
            </div>
        </div>

        <div id="view-admin" class="view hidden-right">
            <h2 style="color: #a7f3d0; font-size: 1.6rem; margin-bottom: 10px;">Panel Control Admin</h2>
            
            <div class="users-container" style="margin-top: 10px;">
                <div class="users-title" style="font-size: 0.9rem; color: #ef4444;">Eliminar Inscritos</div>
                <div class="users-box" style="border-color: #ef4444; height: 130px;">
                    <ul class="user-list" id="admin-users-list"></ul>
                </div>

                <div class="users-title" style="margin-top: 25px; font-size: 0.9rem; color: #00d4ff;">Editar Bloc de Notas (INFO)</div>
                <textarea class="admin-textarea" id="admin-info-input" placeholder="Escribe aquí las reglas o info del evento..."></textarea>
                <button class="btn-green" id="btn-save-info" style="padding: 12px 30px; font-size: 1.1rem; margin-top: 15px; box-shadow: none;">Actualizar INFO</button>
            </div>
            
            <button class="btn-cancel" id="btn-close-admin" style="margin-top: 25px;">Salir del Panel</button>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let w, h, angle = 0;

        function resizeCanvas() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        // Creamos partículas de destellos de luz (Flares)
        const lightFlares = [];
        for(let i = 0; i < 12; i++) {
            lightFlares.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                radius: Math.random() * 120 + 60,
                alpha: Math.random() * 0.15 + 0.05,
                speed: Math.random() * 0.005 + 0.002,
                phase: Math.random() * Math.PI
            });
        }

        function drawSunRaysBackground() {
            ctx.clearRect(0, 0, w, h); // Deja ver tu fondo transparente

            // 1. GENERACIÓN DE RAYOS DE SOL (Sun Rays ambientales desde la esquina superior izquierda)
            ctx.save();
            ctx.translate(0, 0); // Foco de origen del sol (puedes cambiarlo si quieres)
            ctx.rotate(angle);
            
            const numRays = 24;
            const rayAngle = (Math.PI * 2) / numRays;
            
            for (let i = 0; i < numRays; i++) {
                ctx.beginPath();
                ctx.moveTo(0, 0);
                // Crea un cono de luz expandido hacia afuera
                ctx.arc(0, 0, Math.max(w, h) * 1.5, i * rayAngle, i * rayAngle + (rayAngle * 0.4));
                ctx.lineTo(0, 0);
                
                // Color turquesa/verde esmeralda neón hiper suave para simular haz de luz solar filtrada
                ctx.fillStyle = 'rgba(16, 185, 129, 0.012)';
                ctx.fill();
            }
            ctx.restore();

            // 2. ENFOQUES DE LUZ FLOTANTES (Glow Light Leaks)
            lightFlares.forEach(flare => {
                flare.phase += flare.speed;
                // Hace que la luz aparezca y desaparezca de forma orgánica
                let currentAlpha = flare.alpha * (Math.sin(flare.phase) * 0.5 + 0.5);

                let radialGlow = ctx.createRadialGradient(flare.x, flare.y, 0, flare.x, flare.y, flare.radius);
                radialGlow.addColorStop(0, `rgba(0, 212, 255, ${currentAlpha})`); // Centro azul cian neón
                radialGlow.addColorStop(0.5, `rgba(16, 185, 129, ${currentAlpha * 0.4})`); // Medio verde neón
                radialGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');

                ctx.fillStyle = radialGlow;
                ctx.beginPath();
                ctx.arc(flare.x, flare.y, flare.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            angle += 0.001; // Rotación lenta de los rayos de sol
            requestAnimationFrame(drawSunRaysBackground);
        }
        drawSunRaysBackground();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKNm31kYh-lLAs-pOWIVLQ0x5PKILyBTM",
            authDomain: "inscripcionesevento2137612d.firebaseapp.com",
            projectId: "inscripcionesevento2137612d",
            storageBucket: "inscripcionesevento2137612d.firebasestorage.app",
            messagingSenderId: "659015075726",
            appId: "1:659015075726:web:ac9e83f12e72a43b4dc6df",
            measurementId: "G-CN3MER5DMZ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const viewHome = document.getElementById('view-home');
        const viewForm = document.getElementById('view-form');
        const viewAdmin = document.getElementById('view-admin');
        const discordInput = document.getElementById('discord-user');
        const usersListElement = document.getElementById('users-list');
        const adminUsersListElement = document.getElementById('admin-users-list');
        const usersCounterElement = document.getElementById('users-counter');
        const infoNotepadText = document.getElementById('info-notepad-text');
        const adminInfoInput = document.getElementById('admin-info-input');
        const btnGoForm = document.getElementById('btn-go-form');
        const btnCancel = document.getElementById('btn-cancel');
        const btnSubmit = document.getElementById('btn-submit');
        const btnCloseAdmin = document.getElementById('btn-close-admin');
        const btnSaveInfo = document.getElementById('btn-save-info');
        const adminDotTrigger = document.getElementById('admin-dot-trigger');

        adminDotTrigger.addEventListener('click', () => {
            const clave = prompt("Introduce clave de acceso:");
            if (clave === "0877") {
                viewHome.classList.remove('active'); viewHome.classList.add('hidden-left');
                viewAdmin.classList.remove('hidden-right'); viewAdmin.classList.add('active');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else if (clave !== null) {
                alert("Acceso denegado.");
            }
        });

        btnCloseAdmin.addEventListener('click', () => {
            viewAdmin.classList.remove('active'); viewAdmin.classList.add('hidden-right');
            viewHome.classList.remove('hidden-left'); viewHome.classList.add('active');
        });

        btnGoForm.addEventListener('click', () => {
            viewHome.classList.remove('active'); viewHome.classList.add('hidden-left');
            viewForm.classList.remove('hidden-right'); viewForm.classList.add('active');
            setTimeout(() => discordInput.focus(), 600);
        });

        btnCancel.addEventListener('click', () => {
            viewForm.classList.remove('active'); viewForm.classList.add('hidden-right');
            viewHome.classList.remove('hidden-left'); viewHome.classList.add('active');
            discordInput.value = '';
        });

        async function registerUser() {
            const user = discordInput.value.trim();
            if (user === '') {
                discordInput.style.transform = 'translateX(-10px)';
                setTimeout(() => discordInput.style.transform = 'translateX(10px)', 100);
                setTimeout(() => discordInput.style.transform = 'translateX(0)', 200);
                return;
            }
            btnSubmit.disabled = true; btnSubmit.textContent = "Guardando...";
            try {
                await addDoc(collection(db, "inscripciones"), { username: user, timestamp: serverTimestamp() });
                btnCancel.click(); 
            } catch (error) {
                alert("Error al guardar.");
            } finally {
                btnSubmit.disabled = false; btnSubmit.textContent = "Inscribirse";
            }
        }
        btnSubmit.addEventListener('click', registerUser);
        discordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') registerUser(); });

        btnSaveInfo.addEventListener('click', async () => {
            const nuevoTexto = adminInfoInput.value;
            btnSaveInfo.disabled = true; btnSaveInfo.textContent = "Guardando...";
            try {
                await setDoc(doc(db, "configuracion", "texto_info"), { contenido: nuevoTexto });
                alert("¡Bloc de Notas de INFO actualizado con éxito! 🎉");
            } catch (e) {
                alert("Error al actualizar la información.");
            } finally {
                btnSaveInfo.disabled = false; btnSaveInfo.textContent = "Actualizar INFO";
            }
        });

        const qUsers = query(collection(db, "inscripciones"), orderBy("timestamp", "desc"));
        onSnapshot(qUsers, (snapshot) => {
            usersListElement.innerHTML = ''; adminUsersListElement.innerHTML = '';
            usersCounterElement.textContent = `Total inscritos: ${snapshot.size}`;
            
            if (snapshot.empty) {
                const emptyItem = '<li style="justify-content:center; opacity:0.5; cursor:default;">Aún no hay inscritos</li>';
                usersListElement.innerHTML = emptyItem; adminUsersListElement.innerHTML = emptyItem;
                return;
            }
            snapshot.forEach((documentoFirebase) => {
                const data = documentoFirebase.data();
                
                const liNormal = document.createElement('li');
                liNormal.textContent = data.username;
                usersListElement.appendChild(liNormal);

                const liAdmin = document.createElement('li');
                liAdmin.textContent = data.username;
                const btnEliminar = document.createElement('button');
                btnEliminar.className = 'btn-mini-delete'; btnEliminar.textContent = 'Eliminar';
                btnEliminar.onclick = async () => {
                    if (confirm(`¿Remover a ${data.username}?`)) {
                        await deleteDoc(doc(db, "inscripciones", documentoFirebase.id));
                    }
                };
                liAdmin.appendChild(btnEliminar);
                adminUsersListElement.appendChild(liAdmin);
            });
        });

        onSnapshot(doc(db, "configuracion", "texto_info"), (documento) => {
            if (documento.exists()) {
                const textoGlobal = documento.data().contenido;
                infoNotepadText.textContent = textoGlobal;
                adminInfoInput.value = textoGlobal;
            } else {
                infoNotepadText.innerHTML = '<span style="opacity:0.5;">No hay información disponible.</span>';
                adminInfoInput.value = '';
            }
        });
    </script>
</body>
</html>
